<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar | ARZKEYS</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
:root {
    --bg-primary: #0a0a0c;
    --bg-secondary: #121216;
    --bg-card: #1a1a20;
    --bg-hover: #22222a;
    --border: #2a2a35;
    --border-light: #3a3a45;
    --text-primary: #ffffff;
    --text-secondary: #a0a0b0;
    --text-muted: #6a6a7a;
    --accent-cyan: #00f0ff;
    --accent-cyan-dark: #00c8d4;
    --accent-purple: #bd00ff;
    --accent-pink: #ff006e;
    --accent-lime: #ccff00;
    --gradient-main: linear-gradient(135deg, #00f0ff 0%, #bd00ff 100%);
    --gradient-glow: linear-gradient(135deg, rgba(0, 240, 255, 0.15) 0%, rgba(189, 0, 255, 0.15) 100%);
    --shadow-glow: 0 0 60px rgba(0, 240, 255, 0.2);
    --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.4);
    --radius: 16px;
    --radius-sm: 10px;
    --font: 'Outfit', sans-serif;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

html {
    scroll-behavior: smooth;
}

body {
    min-height: 100vh;
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: var(--font);
    line-height: 1.6;
    overflow-x: hidden;
}

body::before {
    content: "";
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: 
        radial-gradient(circle at 20% 30%, rgba(0, 240, 255, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(189, 0, 255, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 50% 50%, rgba(255, 0, 110, 0.05) 0%, transparent 50%);
    animation: bgPulse 15s ease-in-out infinite;
    z-index: -1;
}

@keyframes bgPulse {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    50% { transform: translate(-2%, -2%) rotate(1deg); }
}

.login-container {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
}

.login-bg-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.5;
    animation: orbFloat 8s ease-in-out infinite;
}

.orb-1 {
    width: 300px;
    height: 300px;
    background: var(--accent-cyan);
    top: -150px;
    right: -100px;
}

.orb-2 {
    width: 250px;
    height: 250px;
    background: var(--accent-purple);
    bottom: -100px;
    left: -80px;
    animation-delay: 2s;
}

@keyframes orbFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(10px, -10px) scale(1.05); }
}

.login-card {
    width: 100%;
    max-width: 480px;
    background: rgba(26, 26, 32, 0.8);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 48px 40px;
    box-shadow: var(--shadow-card), var(--shadow-glow);
    position: relative;
    overflow: hidden;
}

.login-card::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--gradient-main);
}

.login-logo {
    text-align: center;
    margin-bottom: 32px;
}

.logo-mark {
    width: 70px;
    height: 70px;
    margin: 0 auto 16px;
    background: var(--gradient-main);
    border-radius: var(--radius-sm);
    display: grid;
    place-items: center;
    font-size: 2rem;
    font-weight: 800;
    color: var(--bg-primary);
    box-shadow: 0 0 40px rgba(0, 240, 255, 0.4);
}

.logo-text {
    font-size: 1.8rem;
    font-weight: 800;
    background: var(--gradient-main);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 2px;
}

.logo-subtitle {
    color: var(--text-secondary);
    font-size: 0.95rem;
    margin-top: 8px;
}

.login-form {
    display: flex;
    flex-direction: column;
    gap: 24px;
}

.form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.form-label {
    color: var(--text-secondary);
    font-size: 0.9rem;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 6px;
}

.form-label svg {
    width: 16px;
    height: 16px;
    color: var(--accent-cyan);
}

.form-input-wrapper {
    position: relative;
}

.form-input {
    width: 100%;
    height: 54px;
    padding: 0 16px 0 48px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    font-size: 1rem;
    transition: all 0.3s ease;
}

.form-input::placeholder {
    color: var(--text-muted);
}

.form-input:focus {
    outline: none;
    border-color: var(--accent-cyan);
    box-shadow: 0 0 0 3px rgba(0, 240, 255, 0.15);
    background: var(--bg-hover);
}

.form-input-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    width: 20px;
    height: 20px;
    color: var(--text-muted);
    pointer-events: none;
}

.form-input:focus + .form-input-icon,
.form-input-wrapper:focus-within .form-input-icon {
    color: var(--accent-cyan);
}

.password-toggle {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px;
}

.password-toggle:hover {
    color: var(--accent-cyan);
}

.form-options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
}

.remember-me {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
}

.remember-me input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: var(--accent-cyan);
}

.remember-me span {
    color: var(--text-secondary);
    font-size: 0.9rem;
}

.forgot-link {
    color: var(--accent-cyan);
    font-size: 0.9rem;
    font-weight: 500;
}

.forgot-link:hover {
    color: var(--accent-purple);
    text-decoration: underline;
}

.submit-btn {
    width: 100%;
    height: 54px;
    background: var(--gradient-main);
    border: none;
    border-radius: var(--radius-sm);
    color: var(--bg-primary);
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
}

.submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 40px rgba(0, 240, 255, 0.4);
}

.divider {
    display: flex;
    align-items: center;
    gap: 16px;
    color: var(--text-muted);
    font-size: 0.85rem;
    margin: 20px 0;
}

.divider::before,
.divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--border);
}

.social-login {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.social-btn {
    width: 100%;
    height: 50px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    transition: all 0.3s ease;
}

.social-btn:hover {
    background: var(--bg-hover);
    transform: translateY(-2px);
}

.social-btn.google:hover { border-color: #db4437; }
.social-btn.facebook:hover { border-color: #4267B2; }

.register-link {
    text-align: center;
    color: var(--text-secondary);
    font-size: 0.95rem;
    margin-top: 24px;
}

.register-link a {
    color: var(--accent-cyan);
    font-weight: 600;
}

.register-link a:hover {
    color: var(--accent-purple);
    text-decoration: underline;
}

.error-message {
    background: rgba(255, 71, 71, 0.1);
    border: 1px solid rgba(255, 71, 71, 0.3);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    color: #ff6b6b;
    font-size: 0.9rem;
    margin-bottom: 20px;
    display: none;
}

.error-message.show {
    display: flex;
    align-items: center;
    gap: 10px;
}

@media (max-width: 520px) {
    .login-card {
        padding: 36px 24px;
    }
    
    .logo-mark {
        width: 60px;
        height: 60px;
        font-size: 1.6rem;
    }
    
    .logo-text {
        font-size: 1.5rem;
    }
}
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-bg-orb orb-1"></div>
        <div class="login-bg-orb orb-2"></div>
        
        <div class="login-card">
            <div class="login-logo">
                <div class="logo-mark">A</div>
                <div class="logo-text">ARZKEYS</div>
                <div class="logo-subtitle">Ingresa a tu cuenta</div>
            </div>
            
            <div id="loginError" class="error-message">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <span id="errorText">Credenciales incorrectas</span>
            </div>
            
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label class="form-label">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        Correo electrónico
                    </label>
                    <div class="form-input-wrapper">
                        <input type="email" id="email" class="form-input" placeholder="tu@email.com" required>
                        <svg class="form-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                            <polyline points="22,6 12,13 2,6"/>
                        </svg>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        Contraseña
                    </label>
                    <div class="form-input-wrapper">
                        <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                        <svg class="form-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <button type="button" class="password-toggle" onclick="togglePassword()">
                            <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>
                
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="remember">
                        <span>Recordarme</span>
                    </label>
                    <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
                </div>
                
                <button type="submit" class="submit-btn">Ingresar</button>
            </form>
            
            <div class="divider">o continúa con</div>
            
            <div class="social-login">
                <button class="social-btn google" onclick="handleSocialLogin('google')">
                    <svg width="22" height="22" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Google
                </button>
                <button class="social-btn facebook" onclick="handleSocialLogin('facebook')">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="#4267B2">
                        <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                    </svg>
                    Facebook
                </button>
            </div>
            
            <div class="register-link">
                ¿No tienes cuenta? <a href="register.html">Regístrate gratis</a>
            </div>
        </div>
    </div>

    <script>
window.ARZKEYS_POCKETBASE = {
    url: "https://arzkeysapi.duckdns.org",
    adminEmail: "admin@arzkeys.local"
};

function togglePassword() {
    const passwordInput = document.getElementById('password');
    const eyeIcon = document.getElementById('eyeIcon');
    
    if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/><line x1="1" y1="1" x2="23" y2="23"/>';
    } else {
        passwordInput.type = 'password';
        eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }
}

function handleSocialLogin(provider) {
    alert('Login con ' + provider + ' será implementado pronto');
}

document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errorDiv = document.getElementById('loginError');
    const submitBtn = document.querySelector('.submit-btn');
    
    errorDiv.classList.remove('show');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Verificando...';
    
    try {
        await new Promise(resolve => setTimeout(resolve, 1500));
        console.log('Login:', { email });
        window.location.href = 'dashboard.html';
    } catch (error) {
        document.getElementById('errorText').textContent = error.message || 'Error al iniciar sesión';
        errorDiv.classList.add('show');
    } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Ingresar';
    }
});
    </script>
</body>
</html>
